name: LimitedWorldEdit
version: ${project.version}
main: com.james137137.limitedworldedit.LimitedWorldEditPlugin
api-version: '26.1.2'
description: Restricts WorldEdit operations to WorldGuard regions owned by the player.
authors: [James Anderson]
website: https://github.com/james137137/LimitedWorldEdit
depend: [WorldEdit, WorldGuard]
permissions:
  limitedworldedit.*:
    description: Grants every LimitedWorldEdit permission.
    default: op
    children:
      limitedworldedit.bypass: true
  limitedworldedit.bypass:
    description: Allows WorldEdit operations outside owned WorldGuard regions.
    default: op
